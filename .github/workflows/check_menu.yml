name: Check KNU Menu Updates

on:
  schedule:
    # 매일 06:00, 09:00, 12:00, 15:00, 18:00 KST
    # KST = UTC+9 이므로, UTC 기준으로 -9시간
    # 06:00 KST = 21:00 UTC (전날)
    # 09:00 KST = 00:00 UTC
    # 12:00 KST = 03:00 UTC
    # 15:00 KST = 06:00 UTC
    # 18:00 KST = 09:00 UTC
    - cron: '0 21,0,3,6,9 * * *'
  workflow_dispatch:  # 수동 실행 가능

# last_menus.json 상태 파일을 커밋/푸시하기 위한 쓰기 권한
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 20 deprecation 경고 제거

jobs:
  check-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and send menu updates
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_CAFETERIA: ${{ secrets.CHANNEL_CAFETERIA }}
          CHANNEL_INFO_CENTER: ${{ secrets.CHANNEL_INFO_CENTER }}
          CHANNEL_WELFARE: ${{ secrets.CHANNEL_WELFARE }}
          CHANNEL_GAMKKOT: ${{ secrets.CHANNEL_GAMKKOT }}
          CHANNEL_ENG_STAFF: ${{ secrets.CHANNEL_ENG_STAFF }}
          CHANNEL_ENG_STUDENT: ${{ secrets.CHANNEL_ENG_STUDENT }}
        run: python -m src.main

      - name: Commit updated menu state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_menus.json
          git diff --staged --quiet || git commit -m "Update menu state [skip ci]"
          git push
